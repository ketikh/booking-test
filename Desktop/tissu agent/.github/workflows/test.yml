name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx black isort ruff mypy

      - name: Lint with ruff
        run: python -m ruff check src/ server.py

      - name: Check formatting with black
        run: python -m black --check src/ server.py

      - name: Check import order with isort
        run: python -m isort --check-only src/ server.py

      - name: Type check with mypy
        run: python -m mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests with coverage
        env:
          ANTHROPIC_API_KEY: test-key-not-real
        run: python -m pytest --cov=src --cov-report=term-missing --cov-fail-under=80 -v

      - name: Security audit
        run: pip audit
        continue-on-error: true
